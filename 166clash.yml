proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - 🚀 手动切换
      - DIRECT
  - name: 🚀 手动切换
    type: select
    include-all: true
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
