proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🌍 非自己节点
      - 🇸🇬 新加坡节点
      - 🇺🇲 美国节点
      - DIRECT
  - name: 🚀 手动切换
    type: select
    include-all: true
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🌍 非自己节点
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT
  - name: 🤖 人工智能
    type: select
    proxies:
      - 🇸🇬 新加坡节点
      - 🇺🇲 美国节点
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT
      - 🚀 手动切换
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT
      - 🚀 手动切换
  - name: 🌍 非自己节点
    type: url-test
    include-all: true
    filter: ^(?!.*\d+\.\d+\.\d+\.\d+).*$
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇸🇬 新加坡节点
    type: url-test
    include-all: true
    filter: (新加坡|坡|狮城|SG|Singapore)
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇺🇲 美国节点
    type: url-test
    include-all: true
    filter: (美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择

